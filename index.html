<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Simulador LG Giant C</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#0d0d12;--text:#f0f0f5;--dim:#b0b0c0;--card:#1a1a25;--border:#333345;--accent:#ff4136;--green:#2ecc40;--blue:#4a9eff;--warn:#f4a623;--led:#ff2a1a;--glow:rgba(255,42,26,.35);--panel:#f7f3ee;--panel2:#eae5de;--pbord:#c8c2b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px}
.app{max-width:860px;margin:0 auto;padding:12px;display:flex;flex-direction:column;gap:14px}

/* === GUIDE (NOW ON TOP) === */
.guide-top{order:1}
.tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:10px 14px;border-radius:8px;background:var(--card);border:2px solid var(--border);color:var(--dim);font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s}
.tab.ac{background:var(--accent);border-color:var(--accent);color:#fff}
.tab.dn{background:#1a2e1a;border-color:var(--green);color:var(--green)}
.gc{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:20px}
.gn{font-size:.8rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.gt{font-size:1.25rem;font-weight:700;color:#fff;margin-bottom:10px;line-height:1.3}
.gd{font-size:1rem;color:var(--dim);line-height:1.7;margin-bottom:14px}
.gd b{color:#fff}
.gd code{background:#2a2a3a;padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:.95rem;color:var(--led)}
.ga{display:flex;align-items:center;gap:10px;padding:14px 18px;border-radius:10px;font-size:1rem;font-weight:700;background:rgba(255,65,54,.1);border:2px solid rgba(255,65,54,.25);color:var(--accent)}
.ga.gr{background:rgba(46,204,64,.1);border-color:rgba(46,204,64,.25);color:var(--green)}
.ga.wr{background:rgba(244,166,35,.1);border-color:rgba(244,166,35,.25);color:var(--warn)}
.ga .arrow{font-size:1.4rem}
.pb{width:100%;height:5px;background:var(--border);border-radius:3px;margin-top:14px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .5s}
.cmp{text-align:center;padding:28px}
.cmp .ic{font-size:3.5rem;margin-bottom:12px}
.cmp h2{font-size:1.4rem;color:var(--green);margin-bottom:10px}
.cmp p{color:var(--dim);font-size:1rem;line-height:1.6}
.rb{margin-top:16px;padding:14px 28px;background:var(--card);border:2px solid var(--border);border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer}

/* === MACHINE (BELOW GUIDE) === */
.machine-section{order:2}
.mw{background:#d5d0c8;border-radius:16px;padding:14px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.ml{font-size:.65rem;color:#888;text-align:center;margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.pnl{background:var(--panel);border:2px solid var(--pbord);border-radius:10px;padding:12px;display:flex;gap:10px;align-items:stretch}

/* Left: Processing */
.pl{display:flex;flex-direction:column;justify-content:center;gap:4px;padding:8px;border:1.5px dashed #bbb;border-radius:8px;min-width:100px}
.plt{font-size:.55rem;font-weight:700;color:#555;text-align:center;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
.pr{display:flex;align-items:center;gap:3px;justify-content:center}
.pg{display:flex;flex-direction:column;align-items:center;gap:1px}
.pi{width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.pi svg{width:18px;height:18px}
.plds{display:flex;gap:2px}
.pld{width:4px;height:4px;border-radius:50%;background:#ddd;border:1px solid #bbb}
.plbl{font-size:.42rem;color:#888}
.parr{color:#bbb;font-size:.5rem}

/* Center: Display */
.pc{flex:1;display:flex;flex-direction:column;gap:4px}
.db{border:1.5px dashed #bbb;border-radius:8px;padding:10px;display:flex;align-items:center;gap:8px;flex:1}
.wi{display:flex;flex-direction:column;align-items:center;gap:1px}
.wi svg{width:20px;height:20px;fill:#bbb}
.wi span{font-size:.4rem;color:#aaa}
.ls{flex:1;background:#111;border-radius:6px;padding:10px 12px;display:flex;align-items:center;justify-content:center;min-height:52px;box-shadow:inset 0 2px 6px rgba(0,0,0,.6);position:relative}
.seg-display{display:flex;align-items:center;justify-content:center;min-height:36px}
.seg-display svg{filter:drop-shadow(0 0 3px var(--glow))}
.seg-display.ok svg{filter:drop-shadow(0 0 3px rgba(46,204,64,.35))}
.mn{font-size:.4rem;color:#888;position:absolute;bottom:2px;right:6px}
.dbot{display:flex;justify-content:space-between;align-items:center;padding:0 3px}
.dl{display:flex;align-items:center;gap:2px;font-size:.4rem;color:#aaa}
.dle{width:3px;height:3px;border-radius:50%;background:#ddd;border:1px solid #bbb}

/* Right: Buttons */
.prr{display:flex;flex-direction:column;gap:5px;min-width:170px}
.bg{border:1.5px dashed #bbb;border-radius:8px;padding:8px;display:flex;flex-direction:column;gap:5px;position:relative}
.bgt{font-size:.48rem;font-weight:700;color:#555;text-align:center;letter-spacing:.06em;text-transform:uppercase;position:absolute;top:-7px;left:50%;transform:translateX(-50%);background:var(--panel);padding:0 6px}
.cb{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--panel2);border:2px solid var(--pbord);border-radius:8px;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif;user-select:none;position:relative;min-height:48px}
.cb:active{background:#d5d0c7;transform:scale(.97)}
.cb.dis{opacity:.3;cursor:default;pointer-events:none}
.bb{width:24px;height:4px;background:#aaa;border-radius:2px;flex-shrink:0}
.bls{flex:1}
.bm{font-size:.9rem;font-weight:700;color:#333;display:flex;align-items:center;gap:3px}
.bm span{font-weight:400;font-size:.6rem;color:#888}
.bs{font-size:.6rem;color:#777;font-weight:500}
.ba{font-size:.7rem;color:#555;flex-shrink:0}
.ft{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.55rem;font-weight:700;letter-spacing:.03em;vertical-align:middle;margin-left:3px}
.ft.bk{background:rgba(255,65,54,.15);color:var(--accent)}
.ft.up{background:rgba(74,158,255,.15);color:var(--blue)}
.ft.dn{background:rgba(74,158,255,.15);color:var(--blue)}
.ft.ok{background:rgba(46,204,64,.15);color:var(--green)}

/* Highlight states - BIGGER and MORE VISIBLE */
.cb.hl{border-color:var(--accent);background:#fff5f4;box-shadow:0 0 0 3px rgba(255,65,54,.25),0 0 14px rgba(255,65,54,.15);animation:hp 1.2s ease-in-out infinite}
.cb.hw{border-color:var(--warn);background:#fffaf0;box-shadow:0 0 0 3px rgba(244,166,35,.3),0 0 14px rgba(244,166,35,.2);animation:hw 1.2s ease-in-out infinite}
@keyframes hp{0%,100%{box-shadow:0 0 0 3px rgba(255,65,54,.25),0 0 14px rgba(255,65,54,.15)}50%{box-shadow:0 0 0 5px rgba(255,65,54,.35),0 0 20px rgba(255,65,54,.25)}}
@keyframes hw{0%,100%{box-shadow:0 0 0 3px rgba(244,166,35,.3),0 0 14px rgba(244,166,35,.2)}50%{box-shadow:0 0 0 5px rgba(244,166,35,.4),0 0 20px rgba(244,166,35,.3)}}

/* "APERTE AQUI" badge */
.hl-badge{position:absolute;bottom:-10px;right:8px;background:var(--accent);color:#fff;font-size:.6rem;font-weight:700;padding:3px 8px;border-radius:4px;animation:badge 1.2s ease-in-out infinite;white-space:nowrap;z-index:2}
.hl-badge.warn-badge{background:var(--warn)}
@keyframes badge{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* Start button */
.sa{display:flex;gap:6px;align-items:stretch;margin-top:3px}
.sb{flex:1;padding:12px 14px;background:var(--panel2);border:2px solid var(--pbord);border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;user-select:none;display:flex;align-items:center;gap:8px;min-height:52px;position:relative}
.sb:active{background:#d5d0c7;transform:scale(.97)}
.sb.hl{border-color:var(--green);background:#f0fff4;box-shadow:0 0 0 3px rgba(46,204,64,.25),0 0 14px rgba(46,204,64,.15);animation:hg 1.2s ease-in-out infinite}
.sb .hl-badge{background:var(--green)}
@keyframes hg{0%,100%{box-shadow:0 0 0 3px rgba(46,204,64,.25),0 0 14px rgba(46,204,64,.15)}50%{box-shadow:0 0 0 5px rgba(46,204,64,.35),0 0 20px rgba(46,204,64,.25)}}
.cpg{padding:6px 8px;background:var(--panel2);border:1.5px solid var(--pbord);border-radius:6px;font-size:.5rem;font-weight:600;color:#777;text-align:center;line-height:1.2;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:60px;cursor:default;opacity:.35}

/* Hold button */
.ho{display:none;margin-top:6px}
.ho.sh{display:block}
.hb{width:100%;padding:16px;background:linear-gradient(135deg,var(--warn),#e6950a);border:none;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;color:#fff;animation:hw 1.2s ease-in-out infinite}
.hb:active{filter:brightness(.9);transform:scale(.97)}


/* Flash feedback */
@keyframes flash{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
.flash{animation:flash .2s ease-out}

/* Mobile */
@media(max-width:640px){
  .pnl{flex-direction:column}
  .pl{flex-direction:row;min-width:auto}
  .prr{min-width:auto}
  .cb{min-height:52px}
  .sb{min-height:56px}
  .gt{font-size:1.15rem}
  .gd{font-size:.95rem}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const T=[
{id:'entry',label:'Entrar no Modo de Configuração',steps:[
{t:'Entrar no Modo de Configuração',d:'A máquina está em espera. Precisamos entrar no modo de configuração.',a:'Segure <b>Quente (1º)</b> + <b>Frio (3º)</b> por 5 segundos',at:'warn',hl:['hot','cold'],hold:true,td:'00:00'},
{t:'Selecionar código 03',d:'O display mostra <code>00:00</code>. Pressione o botão <b>Morno</b> para avançar até <code>03</code>.',a:'Pressione <b>Morno</b> (▲ Subir) 3 vezes',at:'',hl:['warm'],td:'03',mp:{b:'warm',n:3,s:['01','02','03']}},
{t:'Confirmar entrada',d:'O display mostra <code>03</code>. Pressione <b>Iniciar</b> para entrar no modo de configuração.',a:'Pressione <b>Iniciar</b> (OK)',at:'green',hl:['start'],td:'L9CI'},
{t:'Ir para o menu tE5t',d:'Você entrou no modo de configuração (<code>L9CI</code>). <b>⚠ NÃO aperte Iniciar aqui!</b> Pressione <b>Quente</b> (Voltar).',a:'Pressione <b>Quente</b> (← Voltar)',at:'',hl:['hot'],td:'tE5t'},
{t:'Ir para o menu 5tUP',d:'O display mostra <code>tE5t</code>. Pressione <b>Morno</b> para ir ao menu de configurações.',a:'Pressione <b>Morno</b> (▲ Subir)',at:'',hl:['warm'],td:'5tUP'},
{t:'Entrar no menu 5tUP',d:'O display mostra <code>5tUP</code>. Pressione <b>Iniciar</b> para entrar.',a:'Pressione <b>Iniciar</b> (OK)',at:'green',hl:['start'],td:'r9Pr'},
]},
{id:'pdtd',label:'Seção 1: PAY',steps:[
{t:'Navegar até t4PE',d:'Estamos no submenu (<code>r9Pr</code>). Pressione <b>Morno</b> ou <b>Frio</b> várias vezes até encontrar <code>t4PE</code>.',a:'Pressione <b>Morno</b> (▲) até aparecer <b>t4PE</b>',at:'',hl:['warm'],td:'t4PE'},
{t:'Entrar em t4PE',d:'O display mostra <code>t4PE</code>. Pressione <b>Iniciar</b> para entrar.',a:'Pressione <b>Iniciar</b> (OK)',at:'green',hl:['start'],td:'Pdtd'},
{t:'Abrir Pdtd',d:'O display mostra <code>Pdtd</code> (Tipo de Produto). Pressione <b>Iniciar</b> para ver o valor atual.',a:'Pressione <b>Iniciar</b> (OK)',at:'green',hl:['start'],td:'FrEE'},
{t:'Selecionar PAY',d:'O display mostra <code>FrEE</code> (gratuito). Pressione <b>Morno</b> para mudar para <code>PAY</code>.',a:'Pressione <b>Morno</b> (▲) para selecionar <b>PAY</b>',at:'',hl:['warm'],td:'PAY'},
{t:'Confirmar PAY ✓',d:'O display mostra <code>PAY</code>. Pressione <b>Iniciar</b> para salvar.',a:'Pressione <b>Iniciar</b> (OK) para salvar',at:'green',hl:['start'],td:'✓ PAY'},
]},
{id:'uend',label:'Seção 2: Coin',steps:[
{t:'Navegar até UEnd',d:'Voltamos ao submenu <code>t4PE</code>. Navegue até <code>UEnd</code>.',a:'Pressione <b>Morno</b> (▲) até aparecer <b>UEnd</b>',at:'',hl:['warm'],td:'UEnd',sd:'Pdtd'},
{t:'Entrar em UEnd',d:'O display mostra <code>UEnd</code> (Tipo de Venda). Pressione <b>Iniciar</b>.',a:'Pressione <b>Iniciar</b> (OK)',at:'green',hl:['start'],td:'CRrd'},
{t:'Selecionar Coin',d:'O display mostra <code>CRrd</code> (Cartão). Pressione <b>Morno</b> para mudar para <code>Coin</code>.',a:'Pressione <b>Morno</b> (▲) para selecionar <b>Coin</b>',at:'',hl:['warm'],td:'Coin'},
{t:'Confirmar Coin ✓',d:'O display mostra <code>Coin</code>. Pressione <b>Iniciar</b> para salvar.',a:'Pressione <b>Iniciar</b> (OK) para salvar',at:'green',hl:['start'],td:'✓ Coin'},
]},
{id:'co1',label:'Seção 3: Valor',steps:[
{t:'Navegar até Co1',d:'Estamos no submenu 5tUP (<code>r9Pr</code>). Pressione <b>Morno</b> ou <b>Frio</b> várias vezes até encontrar <code>Co1</code>.',a:'Pressione <b>Morno</b> (▲) até aparecer <b>Co1</b>',at:'',hl:['warm'],td:'Co1',sd:'r9Pr'},
{t:'Entrar em Co1',d:'O display mostra <code>Co1</code> (Valor da moeda). Pressione <b>Iniciar</b> para ver o valor atual.',a:'Pressione <b>Iniciar</b> (OK)',at:'green',hl:['start'],td:'0100'},
{t:'Ajustar para 1000',d:'Use <b>Morno</b> (▲) para aumentar até <code>1000</code> (= R$10,00). Na simulação, cada clique pula alguns valores.',a:'Pressione <b>Morno</b> (▲) até mostrar <b>1000</b>',at:'',hl:['warm'],td:'1000',mp:{b:'warm',n:5,s:['0200','0400','0600','0800','1000']}},
{t:'Confirmar valor ✓',d:'O display mostra <code>1000</code> (R$10,00). Pressione <b>Iniciar</b> para salvar.',a:'Pressione <b>Iniciar</b> (OK) para salvar',at:'green',hl:['start'],td:'✓ 1000'},
]},
{id:'exit',label:'Sair do Modo de Configuração',steps:[
{t:'Voltar ao menu anterior',d:'Valor salvo! Agora precisamos sair. Pressione <b>Quente</b> (Voltar).',a:'Pressione <b>Quente</b> (← Voltar)',at:'',hl:['hot'],td:'Co1',sd:'P1Po'},
{t:'Continuar voltando',d:'Continue pressionando <b>Quente</b> (Voltar) para sair dos submenus.',a:'Pressione <b>Quente</b> (← Voltar)',at:'',hl:['hot'],td:'r9Pr'},
{t:'Voltar mais um nível',d:'Estamos em <code>r9Pr</code>. Continue pressionando <b>Quente</b> (Voltar).',a:'Pressione <b>Quente</b> (← Voltar)',at:'',hl:['hot'],td:'5tUP'},
{t:'Sair do modo de configuração',d:'Estamos em <code>5tUP</code>. Pressione <b>Quente</b> (Voltar) mais uma vez para sair.',a:'Pressione <b>Quente</b> (← Voltar) para sair',at:'',hl:['hot'],td:'PUSH'},
]},
];
let cT=0,cS=0,disp='PUSH',pC=0,done=new Set(),allDone=false;
function gs(){return allDone?null:T[cT]?.steps[cS]||null}
function vib(ms){try{navigator.vibrate&&navigator.vibrate(ms||30)}catch(e){}}


function adv(){vib(50);const t=T[cT];if(cS<t.steps.length-1){cS++;pC=0;const n=gs();if(n?.sd)disp=n.sd}else{done.add(cT);if(cT<T.length-1){cT++;cS=0;pC=0;const n=gs();if(n?.sd)disp=n.sd}else{allDone=true;disp='PUSH';vib([50,50,100])}}render()}
function hBtn(id){const s=gs();if(!s||s.hold)return;vib(20);if(s.mp){if(id===s.mp.b){if(pC<s.mp.n-1){disp=s.mp.s[pC];pC++;render();return}else{disp=s.mp.s[s.mp.n-1];pC=0;adv();return}}return}if(!s.hl?.includes(id))return;disp=s.td;adv()}
function hHold(){const s=gs();if(!s?.hold)return;vib([30,30,30,30,100]);disp=s.td;adv()}
function hStart(){hBtn('start')}
function selT(i){if(i>0&&!done.has(i-1))return;vib(20);cT=i;cS=0;pC=0;allDone=false;const s=gs();if(s?.sd)disp=s.sd;else if(i===0)disp='PUSH';render()}
function reset(){vib(30);cT=0;cS=0;pC=0;disp='PUSH';done.clear();allDone=false;render()}
function totS(){return T.reduce((a,t)=>a+t.steps.length,0)}
function dneS(){let d=0;for(let i=0;i<T.length;i++){if(done.has(i))d+=T[i].steps.length;else if(i===cT)d+=cS}return d}
function hl(id){const s=gs();if(!s)return'';if(s.hold&&(id==='hot'||id==='cold'))return'hw';if(s.hl?.includes(id))return'hl';return''}
function badge(id){const s=gs();if(!s)return'';if(s.hold&&(id==='hot'||id==='cold'))return'<div class="hl-badge warn-badge">👆 SEGURE AQUI</div>';if(s.hl?.includes(id)){const isStart=id==='start';return`<div class="hl-badge"${isStart?' style="background:var(--green)"':''}>👆 APERTE AQUI</div>`;}return'';}

const W=`<svg viewBox="0 0 24 24"><path d="M12 18c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm-4.24-2.76a6.003 6.003 0 0 1 8.49 0l1.41-1.41a8.003 8.003 0 0 0-11.31 0l1.41 1.41zm-2.83-2.83a10.003 10.003 0 0 1 14.14 0l1.41-1.41c-4.69-4.69-12.28-4.69-16.97 0l1.42 1.41z"/></svg>`;
const WI=`<svg viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5"><rect x="5" y="5" width="14" height="14" rx="2"/><circle cx="12" cy="12" r="4"/><path d="M9 9l6 6M15 9l-6 6" stroke-width="1"/></svg>`;

const SEG_MAP={
'0':'abcdef','1':'bc','2':'abdeg','3':'abcdg','4':'bcfg','5':'acdfg','6':'acdefg','7':'abc',
'8':'abcdefg','9':'abcdfg','A':'abcefg','a':'abcefg','B':'acdefg','b':'cdefg','C':'adef',
'c':'deg','D':'bcdeg','d':'bcdeg','E':'adefg','e':'adefg','F':'aefg','f':'aefg',
'G':'acdef','g':'abcdfg','H':'bcefg','h':'cefg','I':'bc','i':'c','J':'bcd','j':'bcd',
'L':'def','l':'def','N':'abcef','n':'ceg','O':'abcdef','o':'cdeg','P':'abefg','p':'abefg',
'Q':'abcfg','q':'abcfg','R':'eg','r':'eg','S':'acdfg','s':'acdfg','T':'defg','t':'defg',
'U':'bcdef','u':'cde','V':'bcdef','v':'cde','Y':'bcfg','y':'bcfg','-':'g','_':'d',
' ':'','.':'dp',':':'co','\u2713':'abcfg'
};

function segSVG(text, isOk) {
  const on = isOk ? '#22dd44' : '#ff2a1a';
  const off = isOk ? '#0a1a0a' : '#1c0606';
  const chars = text.split('');
  const cw = 26, ch = 44, gap = 16, sk = 4, tw = 4.5;
  const totalW = chars.length * (cw + gap) + sk + 6;
  let svg = `<svg width="${totalW}" height="${ch}" viewBox="0 0 ${totalW} ${ch}" xmlns="http://www.w3.org/2000/svg">`;
  chars.forEach((char, idx) => {
    const ox = idx * (cw + gap) + 3;
    const segs = SEG_MAP[char] || '';
    if (char === ':') {
      const cx = ox + 6;
      svg += `<rect x="${cx}" y="13" width="5" height="5" rx="1.2" fill="${on}"/>`;
      svg += `<rect x="${cx}" y="28" width="5" height="5" rx="1.2" fill="${on}"/>`;
      return;
    }
    if (char === '.') {
      svg += `<rect x="${ox+3}" y="${ch-7}" width="5" height="5" rx="1.2" fill="${on}"/>`;
      return;
    }
    if (char === ' ') return;
    const m = 1.5;
    const top = 2, mid = ch / 2, bot = ch - 2;
    function sx(x, y) { return x + (mid - y) / mid * sk; }
    function hSeg(l, r, y) {
      const hl = tw / 2;
      return `${sx(l+m+hl,y)},${y} ${sx(l+m+tw,y-hl)},${y-hl} ${sx(r-m-tw,y-hl)},${y-hl} ${sx(r-m-hl,y)},${y} ${sx(r-m-tw,y+hl)},${y+hl} ${sx(l+m+tw,y+hl)},${y+hl}`;
    }
    function vSeg(x, y1, y2) {
      const hl = tw / 2;
      const ym = (y1 + y2) / 2;
      return `${sx(x,y1+m)},${y1+m} ${sx(x+hl,y1+m+hl)},${y1+m+hl} ${sx(x+hl,ym)},${ym} ${sx(x+hl,y2-m-hl)},${y2-m-hl} ${sx(x,y2-m)},${y2-m} ${sx(x-hl,ym)},${ym}`;
    }
    const l = ox, r = ox + cw;
    const S = {
      a: hSeg(l, r, top), b: vSeg(r, top, mid), c: vSeg(r, mid, bot),
      d: hSeg(l, r, bot), e: vSeg(l, mid, bot), f: vSeg(l, top, mid), g: hSeg(l, r, mid),
    };
    for (const [seg, pts] of Object.entries(S)) {
      svg += `<polygon points="${pts}" fill="${off}" opacity="0.5"/>`;
    }
    for (const [seg, pts] of Object.entries(S)) {
      if (segs.includes(seg)) svg += `<polygon points="${pts}" fill="${on}"/>`;
    }
  });
  svg += '</svg>';
  return svg;
}
