<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador LG Giant C</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#0d0d12;--text:#e4e4ef;--dim:#7a7a90;--card:#16161f;--border:#2a2a38;--accent:#ff4136;--green:#2ecc40;--blue:#3b82f6;--warn:#f4a623;--led:#ff2a1a;--glow:rgba(255,42,26,.35);--panel:#f7f3ee;--panel2:#eae5de;--pbord:#c8c2b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:860px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.hdr{text-align:center}
.hdr h1{font-size:1.15rem;font-weight:700;background:linear-gradient(135deg,#fff,#aab);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:.72rem;color:var(--dim);margin-top:4px}
.mw{background:#d5d0c8;border-radius:18px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.2)}
.ml{font-size:.6rem;color:#888;text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.pnl{background:var(--panel);border:2px solid var(--pbord);border-radius:12px;padding:16px;display:flex;gap:14px;align-items:stretch}
.pl{display:flex;flex-direction:column;justify-content:center;gap:6px;padding:10px 12px;border:1.5px dashed #bbb;border-radius:8px;min-width:120px}
.plt{font-size:.55rem;font-weight:700;color:#555;text-align:center;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.pr{display:flex;align-items:center;gap:4px;justify-content:center}
.pg{display:flex;flex-direction:column;align-items:center;gap:1px}
.pi{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.pi svg{width:20px;height:20px}
.plds{display:flex;gap:2px;margin-top:1px}
.pld{width:5px;height:5px;border-radius:50%;background:#ddd;border:1px solid #bbb}
.plbl{font-size:.48rem;color:#888;text-align:center}
.parr{color:#bbb;font-size:.6rem}
.pc{flex:1;display:flex;flex-direction:column;gap:6px}
.db{border:1.5px dashed #bbb;border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px;flex:1}
.wi{display:flex;flex-direction:column;align-items:center;gap:2px}
.wi svg{width:22px;height:22px;fill:#bbb}
.wi span{font-size:.45rem;color:#aaa}
.ls{flex:1;background:#111;border-radius:6px;padding:12px 16px;display:flex;align-items:center;justify-content:center;min-height:56px;box-shadow:inset 0 2px 8px rgba(0,0,0,.6);position:relative}
.seg-display{display:flex;align-items:center;justify-content:center;gap:2px;min-height:40px}
.seg-display svg{filter:drop-shadow(0 0 3px var(--glow))}
.seg-display.ok svg{filter:drop-shadow(0 0 3px rgba(46,204,64,.35))}
.mn{font-size:.45rem;color:#888;position:absolute;bottom:3px;right:7px}
.dbot{display:flex;justify-content:space-between;align-items:center;padding:0 4px}
.dl{display:flex;align-items:center;gap:3px;font-size:.45rem;color:#aaa}
.dle{width:4px;height:4px;border-radius:50%;background:#ddd;border:1px solid #bbb}
.prr{display:flex;flex-direction:column;gap:5px;min-width:155px}
.bg{border:1.5px dashed #bbb;border-radius:8px;padding:8px;display:flex;flex-direction:column;gap:4px;position:relative}
.bgt{font-size:.48rem;font-weight:700;color:#555;text-align:center;letter-spacing:.08em;text-transform:uppercase;position:absolute;top:-7px;left:50%;transform:translateX(-50%);background:var(--panel);padding:0 6px}
.cb{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--panel2);border:1.5px solid var(--pbord);border-radius:6px;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif;user-select:none;position:relative}
.cb:hover{background:#e0dbd3;transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.cb:active{background:#d5d0c7;transform:none}
.cb.dis{opacity:.35;cursor:default;pointer-events:none}
.bb{width:22px;height:3px;background:#aaa;border-radius:2px;flex-shrink:0}
.bls{flex:1}
.bm{font-size:.7rem;font-weight:700;color:#333;display:flex;align-items:center;gap:3px}
.bm span{font-weight:400;font-size:.5rem;color:#888}
.bs{font-size:.48rem;color:#999;font-weight:400}
.ba{font-size:.6rem;color:#555;flex-shrink:0;margin-left:auto}
.ft{display:inline-block;padding:1px 4px;border-radius:3px;font-size:.45rem;font-weight:700;letter-spacing:.03em;vertical-align:middle;margin-left:2px}
.ft.bk{background:rgba(255,65,54,.12);color:var(--accent)}
.ft.up{background:rgba(59,130,246,.12);color:var(--blue)}
.ft.dn{background:rgba(59,130,246,.12);color:var(--blue)}
.ft.ok{background:rgba(46,204,64,.12);color:var(--green)}
.cb.hl{border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,65,54,.2),0 0 10px rgba(255,65,54,.12);animation:hp 1.4s ease-in-out infinite}
.cb.hw{border-color:var(--warn);box-shadow:0 0 0 2px rgba(244,166,35,.25),0 0 10px rgba(244,166,35,.15);animation:hw 1.4s ease-in-out infinite}
@keyframes hp{0%,100%{box-shadow:0 0 0 2px rgba(255,65,54,.2),0 0 10px rgba(255,65,54,.12)}50%{box-shadow:0 0 0 4px rgba(255,65,54,.3),0 0 16px rgba(255,65,54,.2)}}
@keyframes hw{0%,100%{box-shadow:0 0 0 2px rgba(244,166,35,.25),0 0 10px rgba(244,166,35,.15)}50%{box-shadow:0 0 0 4px rgba(244,166,35,.35),0 0 16px rgba(244,166,35,.25)}}
.sa{display:flex;gap:8px;align-items:stretch;margin-top:2px}
.sb{flex:1;padding:10px 14px;background:var(--panel2);border:2px solid var(--pbord);border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;user-select:none;display:flex;align-items:center;gap:8px}
.sb:hover{background:#e0dbd3}
.sb:active{background:#d5d0c7}
.sb.hl{border-color:var(--green);box-shadow:0 0 0 2px rgba(46,204,64,.2),0 0 10px rgba(46,204,64,.12);animation:hg 1.4s ease-in-out infinite}
@keyframes hg{0%,100%{box-shadow:0 0 0 2px rgba(46,204,64,.2),0 0 10px rgba(46,204,64,.12)}50%{box-shadow:0 0 0 4px rgba(46,204,64,.3),0 0 16px rgba(46,204,64,.2)}}
.cpg{padding:6px 10px;background:var(--panel2);border:1.5px solid var(--pbord);border-radius:6px;font-size:.5rem;font-weight:600;color:#777;text-align:center;line-height:1.3;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:75px;cursor:default;opacity:.4}
.ho{display:none;margin-top:8px}
.ho.sh{display:block}
.hb{width:100%;padding:12px;background:linear-gradient(135deg,var(--warn),#e6950a);border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:700;color:#fff;animation:hw 1.4s ease-in-out infinite}
.hb:hover{filter:brightness(1.1)}
.tabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;background:var(--card);border:1px solid var(--border);color:var(--dim);font-size:.7rem;font-weight:600;cursor:pointer;transition:all .2s}
.tab:hover{background:#1e1e2a}
.tab.ac{background:var(--accent);border-color:var(--accent);color:#fff}
.tab.dn{background:#1a2e1a;border-color:var(--green);color:var(--green)}
.gc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
.gn{font-size:.6rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.gt{font-size:1rem;font-weight:700;color:#fff;margin-bottom:8px}
.gd{font-size:.82rem;color:var(--dim);line-height:1.6;margin-bottom:12px}
.gd b{color:var(--text)}
.gd code{background:#2a2a38;padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--led)}
.ga{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:6px;font-size:.78rem;font-weight:600;background:rgba(255,65,54,.07);border:1px solid rgba(255,65,54,.18);color:var(--accent)}
.ga.gr{background:rgba(46,204,64,.07);border-color:rgba(46,204,64,.18);color:var(--green)}
.ga.wr{background:rgba(244,166,35,.07);border-color:rgba(244,166,35,.18);color:var(--warn)}
.pb{width:100%;height:3px;background:var(--border);border-radius:2px;margin-top:14px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .5s}
.cmp{text-align:center;padding:24px}
.cmp .ic{font-size:2.5rem;margin-bottom:8px}
.cmp h2{font-size:1.1rem;color:var(--green);margin-bottom:6px}
.cmp p{color:var(--dim);font-size:.8rem;line-height:1.5}
.rb{margin-top:12px;padding:8px 20px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer}
.rb:hover{background:#1e1e2a}
@media(max-width:640px){.pnl{flex-direction:column}.pl{flex-direction:row;min-width:auto}.prr{min-width:auto}.lt{font-size:1.6rem}.sa{flex-direction:column}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const T=[
{id:'entry',label:'Entrar no Modo',steps:[
{t:'Entrar no Modo de ConfiguraГѓВ§ГѓВЈo',d:'A mГѓВЎquina estГѓВЎ em espera. Precisamos entrar no modo de configuraГѓВ§ГѓВЈo (SVC).',a:'Segure <b>1Г‚Вє botГѓВЈo (Hot)</b> + <b>3Г‚Вє botГѓВЈo (Cold)</b> por 5 segundos',at:'warn',hl:['hot','cold'],hold:true,td:'00:00'},
{t:'Selecionar cГѓВіdigo 03',d:'O display mostra <code>00:00</code>. Pressione Warm (ГўВ–ВІ Subir) para avanГѓВ§ar atГѓВ© <code>03</code>.',a:'Pressione <b>Warm</b> (ГўВ–ВІ Subir) 3 vezes',at:'',hl:['warm'],td:'03',mp:{b:'warm',n:3,s:['01','02','03']}},
{t:'Confirmar entrada',d:'O display mostra <code>03</code>. Pressione Start para entrar no modo de configuraГѓВ§ГѓВЈo.',a:'Pressione <b>Start</b> (OK)',at:'green',hl:['start'],td:'L9CI'},
{t:'Navegar para tESt',d:'VocГѓВЄ entrou no modo SVC (<code>L9CI</code>). <b>ГўВљВ  NГѓВѓO aperte Start aqui!</b> Pressione Hot (Voltar).',a:'Pressione <b>Hot</b> (ГўВ†Вђ Voltar)',at:'',hl:['hot'],td:'tESt'},
{t:'Navegar para SEtUP',d:'O display mostra <code>tESt</code>. Pressione Warm para ir ao menu de configuraГѓВ§ГѓВµes.',a:'Pressione <b>Warm</b> (ГўВ–ВІ Subir)',at:'',hl:['warm'],td:'SEtUP'},
{t:'Entrar em SEtUP',d:'O display mostra <code>SEtUP</code>. Pressione Start para entrar.',a:'Pressione <b>Start</b> (OK)',at:'green',hl:['start'],td:'F9Pr'},
]},
{id:'pdtd',label:'SeГѓВ§ГѓВЈo 1: PAY',steps:[
{t:'Navegar atГѓВ© tYPE',d:'Estamos no submenu (<code>F9Pr</code>). Pressione Warm ou Cold vГѓВЎrias vezes atГѓВ© encontrar <code>tYPE</code>.',a:'Pressione <b>Warm</b> (ГўВ–ВІ) atГѓВ© aparecer <b>tYPE</b>',at:'',hl:['warm'],td:'tYPE'},
{t:'Entrar em tYPE',d:'O display mostra <code>tYPE</code>. Pressione Start para entrar.',a:'Pressione <b>Start</b> (OK)',at:'green',hl:['start'],td:'Pdtd'},
{t:'Abrir Pdtd',d:'O display mostra <code>Pdtd</code> (Tipo de Produto). Pressione Start para ver o valor atual.',a:'Pressione <b>Start</b> (OK)',at:'green',hl:['start'],td:'FrEE'},
{t:'Selecionar PAY',d:'O display mostra <code>FrEE</code> (gratuito). Pressione Warm para alternar para <code>PAY</code>.',a:'Pressione <b>Warm</b> (ГўВ–ВІ) para selecionar <b>PAY</b>',at:'',hl:['warm'],td:'PAY'},
{t:'Confirmar PAY ГўВњВ“',d:'O display mostra <code>PAY</code>. Pressione Start para salvar.',a:'Pressione <b>Start</b> (OK) para salvar',at:'green',hl:['start'],td:'ГўВњВ“ PAY'},
]},
{id:'uend',label:'SeГѓВ§ГѓВЈo 2: Coin',steps:[
{t:'Navegar atГѓВ© UEnd',d:'Voltamos ao submenu <code>tYPE</code>. Navegue atГѓВ© <code>UEnd</code>.',a:'Pressione <b>Warm</b> (ГўВ–ВІ) atГѓВ© aparecer <b>UEnd</b>',at:'',hl:['warm'],td:'UEnd',sd:'Pdtd'},
{t:'Entrar em UEnd',d:'O display mostra <code>UEnd</code> (Tipo de Venda). Pressione Start.',a:'Pressione <b>Start</b> (OK)',at:'green',hl:['start'],td:'CRrd'},
{t:'Selecionar Coin',d:'O display mostra <code>CRrd</code> (CartГѓВЈo). Pressione Warm para alternar para <code>Coin</code>.',a:'Pressione <b>Warm</b> (ГўВ–ВІ) para selecionar <b>Coin</b>',at:'',hl:['warm'],td:'Coin'},
{t:'Confirmar Coin ГўВњВ“',d:'O display mostra <code>Coin</code>. Pressione Start para salvar.',a:'Pressione <b>Start</b> (OK) para salvar',at:'green',hl:['start'],td:'ГўВњВ“ Coin'},
]},
{id:'co1',label:'SeГѓВ§ГѓВЈo 3: Valor',steps:[
{t:'Navegar atГѓВ© Co1',d:'Estamos no submenu SEtUP (<code>F9Pr</code>). Pressione Warm ou Cold vГѓВЎrias vezes atГѓВ© encontrar <code>Co1</code>.',a:'Pressione <b>Warm</b> (ГўВ–ВІ) atГѓВ© aparecer <b>Co1</b>',at:'',hl:['warm'],td:'Co1',sd:'F9Pr'},
{t:'Entrar em Co1',d:'O display mostra <code>Co1</code> (Valor da moeda 1). Pressione Start para ver o valor atual.',a:'Pressione <b>Start</b> (OK)',at:'green',hl:['start'],td:'0100'},
{t:'Ajustar para 1000',d:'Use Warm (ГўВ–ВІ) para aumentar atГѓВ© <code>1000</code> (= R$10,00). Na simulaГѓВ§ГѓВЈo, cada clique pula alguns valores para agilizar.',a:'Pressione <b>Warm</b> (ГўВ–ВІ) atГѓВ© mostrar <b>1000</b>',at:'',hl:['warm'],td:'1000',mp:{b:'warm',n:5,s:['0200','0400','0600','0800','1000']}},
{t:'Confirmar valor ГўВњВ“',d:'O display mostra <code>1000</code> (R$10,00). Pressione Start para salvar.',a:'Pressione <b>Start</b> (OK) para salvar',at:'green',hl:['start'],td:'ГўВњВ“ 1000'},
]},
{id:'exit',label:'Sair do Modo',steps:[
{t:'Voltar ao menu anterior',d:'Valor salvo! Agora precisamos sair do modo de configuraГѓВ§ГѓВЈo. Pressione Hot (Voltar) para retornar ao menu anterior.',a:'Pressione <b>Hot</b> (ГўВ†Вђ Voltar)',at:'',hl:['hot'],td:'Co1',sd:'P1Po'},
{t:'Continuar voltando',d:'Continue pressionando Hot (Voltar) para ir saindo dos submenus.',a:'Pressione <b>Hot</b> (ГўВ†Вђ Voltar)',at:'',hl:['hot'],td:'F9Pr'},
{t:'Voltar mais um nГѓВ­vel',d:'Estamos em <code>F9Pr</code>. Continue pressionando Hot (Voltar).',a:'Pressione <b>Hot</b> (ГўВ†Вђ Voltar)',at:'',hl:['hot'],td:'SEtUP'},
{t:'Sair do modo de configuraГѓВ§ГѓВЈo',d:'Estamos em <code>SEtUP</code>. Pressione Hot (Voltar) mais uma vez para sair completamente.',a:'Pressione <b>Hot</b> (ГўВ†Вђ Voltar) para sair',at:'',hl:['hot'],td:'PUSH'},
]},
];
let cT=0,cS=0,disp='PUSH',pC=0,done=new Set(),allDone=false;
function gs(){return allDone?null:T[cT]?.steps[cS]||null}
function adv(){const t=T[cT];if(cS<t.steps.length-1){cS++;pC=0;const n=gs();if(n?.sd)disp=n.sd}else{done.add(cT);if(cT<T.length-1){cT++;cS=0;pC=0;const n=gs();if(n?.sd)disp=n.sd}else{allDone=true;disp='PUSH'}}render()}
function hBtn(id){const s=gs();if(!s||s.hold)return;if(s.mp){if(id===s.mp.b){if(pC<s.mp.n-1){disp=s.mp.s[pC];pC++;render();return}else{disp=s.mp.s[s.mp.n-1];pC=0;adv();return}}return}if(!s.hl?.includes(id))return;disp=s.td;adv()}
function hHold(){const s=gs();if(!s?.hold)return;disp=s.td;adv()}
function hStart(){hBtn('start')}
function selT(i){if(i>0&&!done.has(i-1))return;cT=i;cS=0;pC=0;allDone=false;const s=gs();if(s?.sd)disp=s.sd;else if(i===0)disp='PUSH';render()}
function reset(){cT=0;cS=0;pC=0;disp='PUSH';done.clear();allDone=false;render()}
function totS(){return T.reduce((a,t)=>a+t.steps.length,0)}
function dneS(){let d=0;for(let i=0;i<T.length;i++){if(done.has(i))d+=T[i].steps.length;else if(i===cT)d+=cS}return d}
function hl(id){const s=gs();if(!s)return'';if(s.hold&&(id==='hot'||id==='cold'))return'hw';if(s.hl?.includes(id))return'hl';return''}

const W=`<svg viewBox="0 0 24 24"><path d="M12 18c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm-4.24-2.76a6.003 6.003 0 0 1 8.49 0l1.41-1.41a8.003 8.003 0 0 0-11.31 0l1.41 1.41zm-2.83-2.83a10.003 10.003 0 0 1 14.14 0l1.41-1.41c-4.69-4.69-12.28-4.69-16.97 0l1.42 1.41z"/></svg>`;
const WI=`<svg viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5"><rect x="5" y="5" width="14" height="14" rx="2"/><circle cx="12" cy="12" r="4"/><path d="M9 9l6 6M15 9l-6 6" stroke-width="1"/></svg>`;


// 7-Segment Display Renderer
const SEG_MAP={
'0':'abcdef','1':'bc','2':'abdeg','3':'abcdg','4':'bcfg','5':'acdfg','6':'acdefg','7':'abc',
'8':'abcdefg','9':'abcdfg','A':'abcefg','a':'abcefg','B':'acdefg','b':'cdefg','C':'adef',
'c':'deg','D':'bcdeg','d':'bcdeg','E':'adefg','e':'adefg','F':'aefg','f':'aefg',
'G':'acdef','g':'abcdfg','H':'bcefg','h':'cefg','I':'ef','i':'c','J':'bcd','j':'bcd',
'L':'def','l':'def','N':'abcef','n':'ceg','O':'abcdef','o':'cdeg','P':'abefg','p':'abefg',
'Q':'abcfg','q':'abcfg','R':'eg','r':'eg','S':'acdfg','s':'acdfg','T':'defg','t':'defg',
'U':'bcdef','u':'cde','V':'bcdef','v':'cde','Y':'bcdfg','y':'bcdfg','-':'g','_':'d',
' ':'','.':'dp',':':'co','ГўВњВ“':'abcfg'
};

function segSVG(text, isOk) {
  const on = isOk ? '#22dd44' : '#ff2a1a';
  const off = isOk ? '#0a1a0a' : '#1a0808';
  const glow = isOk ? 'rgba(34,221,68,.4)' : 'rgba(255,42,26,.3)';
  const chars = text.split('');
  const cw = 22, ch = 38, gap = 3;
  const totalW = chars.length * (cw + gap);
  
  let svg = `<svg width="${totalW}" height="${ch}" viewBox="0 0 ${totalW} ${ch}" xmlns="http://www.w3.org/2000/svg">`;
  
  chars.forEach((char, i) => {
    const x = i * (cw + gap);
    const segs = SEG_MAP[char] || '';
    
    if (char === ':') {
      svg += `<circle cx="${x+6}" cy="${ch/3}" r="2.5" fill="${on}"/>`;
      svg += `<circle cx="${x+6}" cy="${ch*2/3}" r="2.5" fill="${on}"/>`;
      return;
    }
    if (char === '.') {
      svg += `<circle cx="${x+5}" cy="${ch-3}" r="2.5" fill="${on}"/>`;
      return;
    }
    if (char === ' ') return;
    
    // Segment definitions: [points]
    const S = {
      a: `${x+4},1 ${x+6},3 ${x+16},3 ${x+18},1 ${x+16},0 ${x+6},0`,
      b: `${x+19},3 ${x+19},16 ${x+18},18 ${x+17},16 ${x+17},5 ${x+18},3`,
      c: `${x+19},20 ${x+19},33 ${x+18},35 ${x+17},33 ${x+17},22 ${x+18},20`,
      d: `${x+4},37 ${x+6},35 ${x+16},35 ${x+18},37 ${x+16},38 ${x+6},38`,
      e: `${x+3},20 ${x+3},33 ${x+4},35 ${x+5},33 ${x+5},22 ${x+4},20`,
      f: `${x+3},3 ${x+3},16 ${x+4},18 ${x+5},16 ${x+5},5 ${x+4},3`,
      g: `${x+4},18 ${x+6},17 ${x+16},17 ${x+18},18 ${x+16},20 ${x+6},20`,
    };
    
    // Draw all segments dim first (ghost)
    for (const [seg, pts] of Object.entries(S)) {
      svg += `<polygon points="${pts}" fill="${off}"/>`;
    }
    // Draw active segments bright
    for (const [seg, pts] of Object.entries(S)) {
      if (segs.includes(seg)) {
        svg += `<polygon points="${pts}" fill="${on}"/>`;
      }
    }
  });
  
  svg += '</svg>';
  return svg;
}
